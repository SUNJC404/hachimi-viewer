services:
  # MeiliSearch 服务保持不变
  meilisearch:
    image: getmeili/meilisearch
    container_name: meilisearch-engine
    environment:
      - MEILI_MASTER_KEY=Meili4752
      - MEILI_ENV=development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/data.ms
    networks:
      - hachimi-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  backend:
    container_name: hachimi-viewer-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql_video_db:3306/video_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - meili.host=http://meilisearch:7700
      - meili.apiKey=Meili4752
      - meili.index.videos=videos
      # JVM 资源限制
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      - meilisearch
    networks:
      - hachimi-net
      - mysql-external-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

# 网络和数据卷的定义保持不变
networks:
  hachimi-net:
  mysql-external-net:
    external: true
    name: mysql_server_default
volumes:
  meili_data:

